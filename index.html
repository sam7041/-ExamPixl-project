<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ExamPixl – Free PDF & Image Tools for Students | Browser-Based</title>
    <meta name="description" content="ExamPixl is a free, browser-based PDF and image processing suite built for students. Compress, merge, split, convert PDFs and images — no uploads, no sign-up, 100% private." />
    <meta name="keywords" content="free pdf tools, compress pdf, merge pdf, image compressor, exam photo resize, JEE photo size, NEET photo requirements, UPSC photo tool, browser pdf tool" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ExamPixl" />
    <link rel="canonical" href="https://exampixl.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://exampixl.com/" />
    <meta property="og:title" content="ExamPixl – Free PDF & Image Tools for Students" />
    <meta property="og:description" content="50+ free tools for PDFs and images. Process everything directly in your browser — no uploads, no account needed." />
    <meta property="og:image" content="https://exampixl.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ExamPixl" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ExamPixl – Free PDF & Image Tools" />
    <meta name="twitter:description" content="50+ free browser-based tools. No uploads, 100% private." />
    <meta name="twitter:image" content="https://exampixl.com/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ExamPixl" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Critical performance hints -->
    <!-- Preconnect to Google Fonts so the font request doesn't block render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load font with display=swap so text is immediately visible -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ExamPixl",
      "url": "https://exampixl.com",
      "description": "Free browser-based PDF and image tools for students. No server uploads.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
      "featureList": [
        "Exam Photo Validator",
        "Signature Canvas",
        "Compress PDF",
        "Merge PDF",
        "Split PDF",
        "PDF to JPG",
        "Image Compressor",
        "Background Remover"
      ]
    }
    </script>

    <!--
      Critical CSS is inlined here so the page has styles before JS loads.
      This prevents the flash of unstyled content (FOUC) on slow connections.
    -->
    <style>
      *,::before,::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%}
      body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,sans-serif;background:#f8fafc;color:#0f172a;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      /* Spinner shown while React hydrates */
      .initial-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f8fafc;z-index:9999;transition:opacity .3s}
      .initial-loader.hidden{opacity:0;pointer-events:none}
      .spinner{width:36px;height:36px;border:3px solid #e0e7ff;border-top-color:#4f46e5;border-radius:50%;animation:spin .7s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      /* Dark mode styles for immediate application */
      html.dark{background:#0f172a;color:#f1f5f9}
      html.dark body{background:#0f172a}
    </style>

    <!-- Initialize theme from localStorage before React mounts to prevent flash -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <!-- Shown immediately, hidden once React mounts -->
    <div class="initial-loader" id="initial-loader">
      <div class="spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
